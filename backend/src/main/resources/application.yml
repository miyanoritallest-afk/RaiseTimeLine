spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 30MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LXVzZQ==}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

aws:
  s3:
    region: ${AWS_S3_REGION:ap-northeast-1}
    bucket-name: ${AWS_S3_BUCKET_NAME:raisetimeline-images-local}
    public-url-base: ${AWS_S3_PUBLIC_URL_BASE:http://localhost:4566/raisetimeline-images-local}
    endpoint-override: ${AWS_S3_ENDPOINT_OVERRIDE:http://localhost:4566}
  access-key-id: ${AWS_ACCESS_KEY_ID:test}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}

logging:
  config: classpath:logback-spring.xml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
