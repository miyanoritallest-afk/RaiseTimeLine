spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 30MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LXVzZQ==}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  upload:
    base-dir: uploads

logging:
  level:
    com.raisetimeline: DEBUG
    org.springframework.security: INFO
