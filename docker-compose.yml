services:
  postgres:
    image: postgres:16-alpine
    container_name: raisetimeline-db
    environment:
      POSTGRES_DB: raisetimeline
      POSTGRES_USER: raisetimeline
      POSTGRES_PASSWORD: raisetimeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.4
    container_name: raisetimeline-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=ap-northeast-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d

volumes:
  postgres_data:
  localstack_data:
